name: opc-nexus

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opc_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-opc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      API_PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-opc_nexus}
      DB_USER: ${POSTGRES_USER:-opc}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
  crawler:
    build:
      context: ..
      dockerfile: apps/crawler/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      CRAWLER_HOST: 0.0.0.0
      CRAWLER_PORT: 8000
    ports:
      - "${CRAWLER_PORT:-8000}:8000"
volumes:
  postgres-data:
  redis-data:
  api-uploads:
