name: opc-nexus

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    init: true
    mem_limit: 384m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opc_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-opc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    restart: unless-stopped
    init: true
    profiles: ["full"]
    mem_limit: 128m
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    restart: unless-stopped
    init: true
    mem_limit: 384m
    env_file:
      - ../.env
    environment:
      NODE_OPTIONS: --max-old-space-size=256
      NODE_ENV: production
      API_PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-opc_nexus}
      DB_USER: ${POSTGRES_USER:-opc}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      REFRESH_COOKIE_PATH: "${REFRESH_COOKIE_PATH:-/auth}"
      CRAWLER_SERVICE_URL: http://crawler:8000
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
    restart: unless-stopped
    init: true
    mem_limit: 320m
    environment:
      NODE_OPTIONS: --max-old-space-size=256
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
      API_INTERNAL_URL: http://api:4000
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

  crawler:
    build:
      context: ..
      dockerfile: apps/crawler/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    restart: unless-stopped
    init: true
    profiles: ["full"]
    mem_limit: 192m
    env_file:
      - ../.env
    environment:
      CRAWLER_HOST: 0.0.0.0
      CRAWLER_PORT: 8000
      CRAWLER_API_URL: http://api:4000
    ports:
      - "127.0.0.1:${CRAWLER_PORT:-8000}:8000"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

  backup:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    init: true
    mem_limit: 96m
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-opc_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-opc}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - postgres-backups:/backups
      - ./scripts:/scripts:ro
    command: ["sh", "/scripts/backup-loop.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

  backup-uploader:
    image: ${AWS_CLI_IMAGE:-amazon/aws-cli:2.17.63}
    profiles: ["backup-s3"]
    restart: unless-stopped
    init: true
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do aws s3 sync /backups \"$${S3_BACKUP_URI:?Set S3_BACKUP_URI}\" --only-show-errors; sleep $${BACKUP_INTERVAL_SECONDS:-86400}; done"]
    env_file:
      - ../.env
    volumes:
      - postgres-backups:/backups:ro
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

  gateway:
    image: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.27-alpine}
    restart: unless-stopped
    init: true
    mem_limit: 64m
    read_only: true
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp
      - /var/cache/nginx
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt: ["no-new-privileges:true"]
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  api-uploads:
  postgres-backups:
