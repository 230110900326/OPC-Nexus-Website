name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Queue deployments instead of allowing two image builds to compete for the ECS's
# limited memory. The lock in the job also protects manual commands on the host.
concurrency:
  group: opc-nexus-ecs-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    # This runner is installed on the production ECS. GitHub only needs an
    # outbound HTTPS connection from the server; it never SSHs into the server.
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Prepare the production environment
        run: |
          set -euo pipefail
          # Keep secrets outside the checkout so Actions never commits or uploads them.
          deploy_root="$HOME/opc-nexus-deploy"
          production_env="$deploy_root/.env"
          mkdir -p "$deploy_root"

          if [ ! -f "$production_env" ]; then
            legacy_env="$(find "$HOME/opc-nexus-releases" -type f -name .env -print 2>/dev/null | sort | tail -n 1 || true)"
            test -n "$legacy_env"
            install -m 600 "$legacy_env" "$production_env"
          fi

          test -s "$production_env"
          install -m 600 "$production_env" .env

      - name: Build and start application
        run: |
          set -euo pipefail
          deploy_root="$HOME/opc-nexus-deploy"

          flock -w 60 "$deploy_root/deploy.lock" bash -s <<'DEPLOY'
          set -euo pipefail
          install -m 600 "$HOME/opc-nexus-deploy/.env" .env

          # Build one service at a time to stay within the 2 GiB ECS memory limit.
          export COMPOSE_PARALLEL_LIMIT=1
          timeout 45m sudo -n docker compose --env-file .env -f infra/docker-compose.yml --profile full up -d --build

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1/ >/dev/null && curl -fsS http://127.0.0.1/api/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done

          echo "The containers started but the public health checks did not pass."
          exit 1
          DEPLOY

      - name: Show deployment status
        if: always()
        run: |
          sudo -n docker compose --env-file .env -f infra/docker-compose.yml --profile full ps

      - name: Show diagnostics after a failed deployment
        if: failure()
        run: |
          sudo -n docker compose --env-file .env -f infra/docker-compose.yml --profile full logs --tail=150 gateway api web crawler
